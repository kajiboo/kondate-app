<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f6f63" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="献立" />
    <title>晩ごはん献立プランナー</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section id="authGate" class="auth-gate" aria-label="合言葉">
      <form id="authForm" class="auth-card">
        <p class="eyebrow">Family Only</p>
        <h2 id="authTitle">合言葉を入力</h2>
        <p id="authMessage" class="auth-message">家族だけで使うための簡易ロックです。</p>
        <label>
          合言葉
          <input id="passcodeInput" type="password" autocomplete="current-password" />
        </label>
        <button id="authButton" class="primary-button" type="submit">開く</button>
      </form>
    </section>

    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Family Dinner Planner</p>
          <h1>晩ごはん献立プランナー</h1>
        </div>
        <div class="top-actions">
          <button id="logCurrentButton" class="icon-button" type="button">ログ保存</button>
          <button id="lockButton" class="icon-button" type="button">ロック</button>
        </div>
      </section>

      <section class="planner-grid">
        <aside class="control-panel" aria-label="献立条件">
          <div class="section-title">
            <h2>基本設定</h2>
          </div>

          <div class="field-pair">
            <label>
              開始日
              <input id="startDate" type="date" />
            </label>
            <label>
              終了日
              <input id="endDate" type="date" />
            </label>
          </div>

          <div class="field-pair">
            <label>
              大人
              <input id="adults" type="number" min="1" max="12" value="2" />
            </label>
            <label>
              子供
              <input id="children" type="number" min="0" max="12" value="2" />
            </label>
          </div>

          <label>
            使いたくない食材
            <input id="avoidIngredients" type="text" placeholder="例: えび, きのこ" />
          </label>

          <label>
            アレルギー
            <input id="allergyIngredients" type="text" placeholder="例: 卵, 乳, 小麦" />
          </label>

          <label>
            子供NG食材
            <input id="childNgIngredients" type="text" placeholder="例: 辛いもの, ピーマン" />
          </label>

          <label>
            常備している食材
            <input id="pantryItems" type="text" placeholder="例: 米, 味噌, 卵" />
          </label>

          <div class="section-title compact">
            <h2>期間内の傾向</h2>
          </div>

          <div class="segmented" role="group" aria-label="平日の手間">
            <input id="effortQuick" name="defaultEffort" type="radio" value="quick" checked />
            <label for="effortQuick">時短</label>
            <input id="effortNormal" name="defaultEffort" type="radio" value="normal" />
            <label for="effortNormal">普通</label>
            <input id="effortCareful" name="defaultEffort" type="radio" value="careful" />
            <label for="effortCareful">しっかり</label>
          </div>

          <label class="toggle-row">
            <input id="preferBento" type="checkbox" checked />
            <span>翌日の弁当に使いやすくする</span>
          </label>

          <label>
            固定ルール
            <select id="proteinRule">
              <option value="balanced">バランスよく</option>
              <option value="moreFish">魚多め</option>
              <option value="lessMeat">肉少なめ</option>
              <option value="moreQuick">時短多め</option>
            </select>
          </label>

          <button id="buildDaysButton" class="secondary-button" type="button">日別条件を作る</button>
          <button id="generateButton" class="primary-button" type="button">献立を考える</button>
        </aside>

        <section class="work-area">
          <div class="summary-strip" aria-label="合計">
            <div>
              <span>日数</span>
              <strong id="totalDays">0</strong>
            </div>
            <div>
              <span>目安カロリー</span>
              <strong id="totalCalories">0 kcal</strong>
            </div>
            <div>
              <span>目安費用</span>
              <strong id="totalCost">0 円</strong>
            </div>
          </div>

          <div class="tabs" role="tablist" aria-label="表示切替">
            <button class="tab is-active" data-tab="days" type="button">日別</button>
            <button class="tab" data-tab="shopping" type="button">買い物</button>
            <button class="tab" data-tab="recipes" type="button">レシピ</button>
            <button class="tab" data-tab="logs" type="button">ログ</button>
          </div>

          <section id="daysView" class="tab-view is-active">
            <div id="daySettings" class="day-settings"></div>
            <div id="mealPlan" class="meal-plan"></div>
          </section>

          <section id="shoppingView" class="tab-view">
            <div class="shopping-tools">
              <button id="copyShoppingButton" class="secondary-button" type="button">買い物リストをコピー</button>
            </div>
            <div id="shoppingList" class="shopping-list"></div>
          </section>

          <section id="recipesView" class="tab-view">
            <div id="recipeList" class="recipe-list"></div>
          </section>

          <section id="logsView" class="tab-view">
            <div id="logList" class="log-list"></div>
          </section>
        </section>
      </section>
    </main>

    <template id="daySettingTemplate">
      <article class="day-card">
        <div class="day-card-header">
          <div>
            <p class="date-label"></p>
            <h3 class="weekday-label"></h3>
          </div>
          <label class="mini-toggle">
            <input class="day-bento" type="checkbox" />
            <span>弁当</span>
          </label>
        </div>
        <div class="field-row">
          <label>
            ジャンル
            <select class="day-genre">
              <option value="any">おまかせ</option>
              <option value="japanese">和食</option>
              <option value="western">洋食</option>
              <option value="chinese">中華</option>
              <option value="other">その他</option>
            </select>
          </label>
          <label>
            手間
            <select class="day-effort">
              <option value="quick">時短</option>
              <option value="normal">普通</option>
              <option value="careful">しっかり</option>
            </select>
          </label>
        </div>
        <label class="wide-field">
          希望献立
          <select class="day-preferred-meal"></select>
        </label>
      </article>
    </template>

    <script src="./recipe-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
